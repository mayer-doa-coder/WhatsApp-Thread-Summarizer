<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900"
     font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="neu-up" x="-35%" y="-35%" width="170%" height="170%">
      <feOffset dx="-7" dy="-7" in="SourceAlpha" result="a1"/>
      <feGaussianBlur stdDeviation="8" in="a1" result="b1"/>
      <feFlood flood-color="#1d2138" flood-opacity="0.75" result="c1"/>
      <feComposite in="c1" in2="b1" operator="in" result="light"/>
      <feOffset dx="7" dy="7" in="SourceAlpha" result="a2"/>
      <feGaussianBlur stdDeviation="8" in="a2" result="b2"/>
      <feFlood flood-color="#06070f" flood-opacity="1" result="c2"/>
      <feComposite in="c2" in2="b2" operator="in" result="dark"/>
      <feMerge>
        <feMergeNode in="light"/><feMergeNode in="dark"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neu-in" x="-5%" y="-5%" width="110%" height="110%">
      <feFlood flood-color="white" result="white"/>
      <feComposite in="white" in2="SourceAlpha" operator="out" result="inv"/>
      <feOffset dx="-4" dy="-4" in="inv" result="di_off"/>
      <feGaussianBlur stdDeviation="5" in="di_off" result="di_blur"/>
      <feFlood flood-color="#06070f" flood-opacity="0.9" result="di_col"/>
      <feComposite in="di_col" in2="di_blur" operator="in" result="di_raw"/>
      <feComposite in="di_raw" in2="SourceAlpha" operator="in" result="dark_in"/>
      <feOffset dx="4" dy="4" in="inv" result="li_off"/>
      <feGaussianBlur stdDeviation="5" in="li_off" result="li_blur"/>
      <feFlood flood-color="#1d2138" flood-opacity="0.6" result="li_col"/>
      <feComposite in="li_col" in2="li_blur" operator="in" result="li_raw"/>
      <feComposite in="li_raw" in2="SourceAlpha" operator="in" result="light_in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/><feMergeNode in="dark_in"/><feMergeNode in="light_in"/>
      </feMerge>
    </filter>
    <filter id="neu-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feOffset dx="-4" dy="-4" in="SourceAlpha" result="a1"/>
      <feGaussianBlur stdDeviation="5" in="a1" result="b1"/>
      <feFlood flood-color="#1d2138" flood-opacity="0.70" result="c1"/>
      <feComposite in="c1" in2="b1" operator="in" result="light"/>
      <feOffset dx="4" dy="4" in="SourceAlpha" result="a2"/>
      <feGaussianBlur stdDeviation="5" in="a2" result="b2"/>
      <feFlood flood-color="#06070f" flood-opacity="1" result="c2"/>
      <feComposite in="c2" in2="b2" operator="in" result="dark"/>
      <feMerge>
        <feMergeNode in="light"/><feMergeNode in="dark"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="btn-glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="g-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#6edfa0"/>
    </linearGradient>
    <linearGradient id="g-btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bcc60"/>
      <stop offset="100%" stop-color="#1a9946"/>
    </linearGradient>
    <radialGradient id="center-haze" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#25D366" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#25D366" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 48 48 M 0 48 L 48 48" fill="none" stroke="#e8eaf6" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="900" fill="#0e1020"/>
  <rect width="1280" height="900" fill="url(#grid)" opacity="0.045"/>
  <ellipse cx="640" cy="450" rx="460" ry="360" fill="url(#center-haze)"/>
  <g fill="white">
    <circle cx="52"   cy="32"  r="0.9" opacity="0.55"/>
    <circle cx="198"  cy="19"  r="0.7" opacity="0.65"/>
    <circle cx="874"  cy="14"  r="0.7" opacity="0.6"/>
    <circle cx="1060" cy="41"  r="0.9" opacity="0.4"/>
    <circle cx="1224" cy="23"  r="0.6" opacity="0.55"/>
    <circle cx="88"   cy="800" r="0.5" opacity="0.35"/>
    <circle cx="1186" cy="780" r="0.7" opacity="0.4"/>
    <circle cx="44"   cy="860" r="0.6" opacity="0.3"/>
    <circle cx="1238" cy="840" r="0.8" opacity="0.35"/>
    <circle cx="300"  cy="750" r="0.5" opacity="0.2"/>
    <circle cx="980"  cy="760" r="0.6" opacity="0.22"/>
  </g>

  <!-- Nav (minimal for auth page) -->
  <rect width="1280" height="64" fill="#0e1020" filter="url(#neu-up)"/>
  <line x1="0" y1="64" x2="1280" y2="64" stroke="#25D366" stroke-width="0.4" opacity="0.2"/>
  <!-- Logo -->
  <rect x="28" y="18" width="30" height="28" rx="8" fill="#0e1020" filter="url(#neu-sm)"/>
  <polyline points="36,26 40,38 43,31 46,38 50,26" fill="none" stroke="#25D366" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="68" y="38" font-size="15" font-weight="700" fill="#e8eaf6">WA Summarizer</text>
  <!-- Right side: "Continue without account" -->
  <text x="1060" y="37" font-size="12" fill="#e8eaf6" opacity="0.22">Continue without account</text>
  <line x1="1213" y1="37" x2="1222" y2="37" stroke="#e8eaf6" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.2"/>
  <polyline points="1218,33 1223,37 1218,41" fill="none" stroke="#e8eaf6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.2"/>

  <!-- Auth card -->
  <rect x="440" y="126" width="400" height="616" rx="20" fill="#0e1020" filter="url(#neu-up)"/>
  <rect x="440" y="126" width="400" height="2" rx="1" fill="url(#g-text)" opacity="0.5"/>

  <!-- Logo repeat inside card -->
  <rect x="611" y="150" width="58" height="52" rx="14" fill="#0e1020" filter="url(#neu-sm)"/>
  <polyline points="624,162 629,177 634,168 639,177 644,162" fill="none" stroke="#25D366" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Tab switcher -->
  <rect x="464" y="220" width="352" height="40" rx="10" fill="#0e1020" filter="url(#neu-in)"/>
  <!-- Sign in (active) -->
  <rect x="468" y="224" width="168" height="32" rx="8" fill="#0e1020" filter="url(#neu-up)"/>
  <rect x="468" y="224" width="168" height="32" rx="8" fill="none" stroke="#25D366" stroke-width="0.8" opacity="0.5"/>
  <text x="552" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#25D366">Sign in</text>
  <!-- Create account (inactive) -->
  <text x="724" y="245" text-anchor="middle" font-size="13" fill="#e8eaf6" opacity="0.25">Create account</text>

  <!-- EMAIL FIELD -->
  <text x="464" y="286" font-size="10" fill="#e8eaf6" opacity="0.2" letter-spacing="1.5" font-weight="600">EMAIL</text>
  <rect x="464" y="294" width="352" height="44" rx="10" fill="#0e1020" filter="url(#neu-in)"/>
  <!-- Email icon (envelope) -->
  <rect x="480" y="308" width="18" height="14" rx="2" fill="none" stroke="#e8eaf6" stroke-width="1.3" stroke-opacity="0.2"/>
  <polyline points="480,308 489,317 498,308" fill="none" stroke="#e8eaf6" stroke-width="1.3" stroke-opacity="0.2" stroke-linejoin="round"/>
  <text x="508" y="320" font-size="12" fill="#e8eaf6" opacity="0.18">you@example.com</text>

  <!-- PASSWORD FIELD -->
  <text x="464" y="360" font-size="10" fill="#e8eaf6" opacity="0.2" letter-spacing="1.5" font-weight="600">PASSWORD</text>
  <rect x="464" y="368" width="352" height="44" rx="10" fill="#0e1020" filter="url(#neu-in)"/>
  <!-- Lock icon -->
  <rect x="480" y="381" width="16" height="12" rx="2" fill="none" stroke="#e8eaf6" stroke-width="1.3" stroke-opacity="0.2"/>
  <path d="M483 381 Q483 374 488 374 Q493 374 493 381" fill="none" stroke="#e8eaf6" stroke-width="1.3" stroke-opacity="0.2" stroke-linecap="round"/>
  <text x="508" y="394" font-size="12" fill="#e8eaf6" opacity="0.18">••••••••••••</text>
  <!-- Show/hide password -->
  <text x="800" y="394" text-anchor="end" font-size="11" fill="#e8eaf6" opacity="0.15">Show</text>

  <!-- Forgot password link -->
  <text x="816" y="430" text-anchor="end" font-size="12" fill="#25D366" opacity="0.4">Forgot password?</text>

  <!-- Sign in button -->
  <rect x="464" y="444" width="352" height="50" rx="12" fill="#0e1020" filter="url(#neu-up)"/>
  <rect x="464" y="444" width="352" height="50" rx="12" fill="url(#g-btn)" filter="url(#btn-glow)"/>
  <text x="640" y="474" text-anchor="middle" font-size="15" font-weight="700" fill="white">Sign in</text>
  <line x1="760" y1="469" x2="769" y2="469" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="765,465 770,469 765,473" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Underglow -->
  <ellipse cx="640" cy="500" rx="100" ry="6" fill="#25D366" opacity="0.08"/>

  <!-- OR divider -->
  <line x1="464" y1="524" x2="596" y2="524" stroke="#e8eaf6" stroke-width="0.5" opacity="0.1"/>
  <text x="640" y="528" text-anchor="middle" font-size="11" fill="#e8eaf6" opacity="0.18">OR</text>
  <line x1="684" y1="524" x2="816" y2="524" stroke="#e8eaf6" stroke-width="0.5" opacity="0.1"/>

  <!-- Continue without account -->
  <rect x="464" y="538" width="352" height="44" rx="11" fill="#0e1020" filter="url(#neu-in)"/>
  <text x="640" y="565" text-anchor="middle" font-size="13" fill="#e8eaf6" opacity="0.25">Continue without account</text>
  <line x1="753" y1="560" x2="762" y2="560" stroke="#e8eaf6" stroke-width="1.3" stroke-linecap="round" stroke-opacity="0.2"/>
  <polyline points="758,556 763,560 758,564" fill="none" stroke="#e8eaf6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.2"/>

  <!-- Register link -->
  <text x="640" y="612" text-anchor="middle" font-size="12" fill="#e8eaf6" opacity="0.18">Don't have an account?</text>
  <text x="640" y="632" text-anchor="middle" font-size="12" fill="#25D366" opacity="0.45">Create one for free — save history, export PDF</text>

  <!-- Register page ghost (second card, offset to show tab) -->
  <!-- Small annotation arrow pointing to "Create account" tab -->
  <line x1="750" y1="208" x2="724" y2="230" stroke="#25D366" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="3 3"/>
  <text x="756" y="206" font-size="10" fill="#e8eaf6" opacity="0.15">Register form here</text>

  <!-- Privacy note -->
  <text x="640" y="760" text-anchor="middle" font-size="10" fill="#e8eaf6" opacity="0.12">Your chat data is never stored — only summaries are saved when you choose to.</text>

  <!-- Screen label -->
  <text x="40" y="880" font-size="10" fill="#e8eaf6" opacity="0.12" letter-spacing="1">06 — LOGIN / REGISTER PAGE</text>
</svg>
